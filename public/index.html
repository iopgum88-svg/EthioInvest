<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthioInvest - Modern Investment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div id="auth-section" class="flex justify-center items-center min-h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-emerald-400 tracking-wide">EthioInvest</h1>
                <p class="text-slate-400 text-sm mt-2" id="auth-subtitle">Create your high-yield account</p>
                <p id="auth-error" class="text-rose-500 text-sm mt-2 font-bold hidden"></p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Full Name</label>
                    <input type="text" id="reg-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="tel" id="reg-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition" placeholder="09...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="reg-pass" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Referral Code (Optional)</label>
                    <input type="text" id="reg-ref" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition" placeholder="e.g., ETHIO-1234">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 font-bold py-3 rounded-lg shadow-lg transition duration-200 mt-4 cursor-pointer">Register</button>
                <p class="text-center text-sm text-slate-400 mt-4">Already have an account? <a href="#" onclick="toggleAuth(false)" class="text-emerald-400 hover:underline">Login</a></p>
            </form>

            <form id="login-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="tel" id="login-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="login-pass" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition">
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 font-bold py-3 rounded-lg shadow-lg transition duration-200 mt-4 cursor-pointer">Login</button>
                <p class="text-center text-sm text-slate-400 mt-4">Don't have an account? <a href="#" onclick="toggleAuth(true)" class="text-emerald-400 hover:underline">Register</a></p>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col">
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-chart-line text-emerald-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-wide">EthioInvest</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="user-display" class="text-slate-300 text-sm font-medium">Welcome, User</span>
                <button onclick="logout()" class="bg-slate-700 hover:bg-rose-600 text-xs font-bold px-4 py-2 rounded-lg transition duration-200 cursor-pointer">Logout</button>
            </div>
        </header>

        <main class="flex-1 p-6 max-w-7xl w-full mx-auto grid grid-cols-1 gap-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Deposited Balance</p>
                    <p class="text-2xl font-black text-white mt-2"><span id="bal-deposit">0.00</span> <span class="text-sm text-slate-400">ETB</span></p>
                </div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 relative overflow-hidden">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Active Invested</p>
                    <p class="text-2xl font-black text-emerald-400 mt-2"><span id="bal-invested">0.00</span> <span class="text-sm text-slate-400">ETB</span></p>
                </div>
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 relative overflow-hidden ring-1 ring-emerald-500/30">
                    <p class="text-xs font-semibold text-emerald-400 uppercase tracking-wider">Live Profit Balance</p>
                    <p class="text-2xl font-black text-emerald-300 mt-2"><span id="bal-earnings">0.00</span> <span class="text-sm text-slate-400">ETB</span></p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentUser = null;

        function toggleAuth(showRegister) {
            document.getElementById('register-form').classList.toggle('hidden', !showRegister);
            document.getElementById('login-form').classList.toggle('hidden', showRegister);
            document.getElementById('auth-subtitle').textContent = showRegister ? "Create your high-yield account" : "Log back into your portfolio";
            document.getElementById('auth-error').classList.add('hidden');
        }

        function showError(message) {
            const errorEl = document.getElementById('auth-error');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        function loadDashboard(userData) {
            currentUser = userData;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            
            // Populate data from database
            document.getElementById('user-display').textContent = `Welcome, ${userData.name}`;
            document.getElementById('bal-deposit').textContent = userData.bal_deposit;
            document.getElementById('bal-invested').textContent = userData.bal_invested;
            document.getElementById('bal-earnings').textContent = userData.bal_earnings;
        }

        // Handle Registration
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                password: document.getElementById('reg-pass').value,
                referred_by: document.getElementById('reg-ref').value || null
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (response.ok) {
                    loadDashboard(data.user);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError("Connection failed. Check if server is running.");
            }
        });

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                phone: document.getElementById('login-phone').value,
                password: document.getElementById('login-pass').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (response.ok) {
                    loadDashboard(data.user);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError("Connection failed. Check if server is running.");
            }
        });

        function logout() {
            currentUser = null;
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
            
            // Clear inputs
            document.getElementById('login-phone').value = '';
            document.getElementById('login-pass').value = '';
        }
    </script>
</body>
</html>
